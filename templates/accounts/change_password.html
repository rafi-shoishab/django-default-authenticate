{% extends 'base.html' %} 

{% block title %} 
change_password
{% endblock %} 

{% block content %}
<div class="flex justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">change password</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-4">
        <label class="block text-gray-700 mb-1">Old Password</label>
        <input type="password" name="old_password" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter password" />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-1">New Password</label>
        <input type="password" name="new_password" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="new password" />
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-1"> Retype New Password</label>
        <input type="password" name="confirm_new_password" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="confirm password" />
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Update</button>
    </form>
  </div>
</div>
{% endblock %}
