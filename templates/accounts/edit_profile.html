{% extends 'base.html' %}

{% block title %}
  edit profile
{% endblock %}

{% block content %}
  <div class="flex justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">edit profile</h2>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-gray-700 font-medium mb-1">
            Username
            <span class="ml-2 px-2 py-0.5 text-xs font-semibold text-white bg-yellow-600 rounded">unchanged</span>
          </label>
          <input type="text" name="user_name" value="{{ data.username }}" readonly 
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-200" placeholder="email or username" />
        </div>

        <!-- value = "{{ dictionary_key.model_name }}"-->
        <div class="mb-4">
          <label class="block text-gray-700 mb-1">First name</label>
          <input type="text" name="first_name" required 
          value="{{ data.first_name }}" 
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter first name" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 mb-1">Last name</label>
          <input type="text" name="last_name" required value="{{ data.last_name}}" 
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter last name" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 mb-1">Email</label>
          <input type="email" name="email" required value="{{ data.email}}"
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter email" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required 
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter password" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 mb-1">Confirm Password</label>
          <input type="password" name="confirm_password" required 
          class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="confirm password" />
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Update profile</button>
      </form>
    </div>
  </div>
{% endblock %}
